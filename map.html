<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <title>Mapbox - Thai Language & Dark/Light Mode</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <!-- Mapbox GL JS v2.15.0 -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    
    <!-- นำเข้า Mapbox GL Language Plugin -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-language/v1.0.0/mapbox-gl-language.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #111; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* สไตล์สำหรับปุ่มสลับโหมด */
        #theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1;
            background-color: #ffffff;
            color: #333333;
            border: 1px solid #ccc;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        #theme-toggle:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
        }
        
        /* สไตล์ปุ่มเมื่ออยู่ในโหมดมืด */
        .dark-btn {
            background-color: #1a2530 !important;
            color: #ffffff !important;
            border: 1px solid #334155 !important;
        }
        .dark-btn:hover {
            background-color: #2c3e50 !important;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="theme-toggle">🌙 เปลี่ยนเป็นโหมดมืด</button>

    <script>
        window.onload = function() {
            try {
                mapboxgl.accessToken = 'pk.eyJ1IjoiY2hhaXlhbmFuIiwiYSI6ImNtbndoeHlvbjA4ZHMycm9qajRyd3E5eGoifQ.Ua-_6wwmhrF0I6k-oZSfEg';
                
                // โหมดสว่างใช้สไตล์ streets (ถนนเทา ต้นไม้เขียว น้ำฟ้า)
                const lightStyle = 'mapbox://styles/mapbox/streets-v12';
                // โหมดมืดใช้ navigation-night (ถนนมืด ต้นไม้เขียวเข้ม น้ำฟ้าเข้ม)
                const darkStyle = 'mapbox://styles/mapbox/navigation-night-v1';
                
                let isDarkMode = false;

                const map = new mapboxgl.Map({
                    container: 'map',
                    style: lightStyle, 
                    projection: 'globe', 
                    zoom: 5, // ซูมเข้ามาที่ระดับ 5 เพื่อให้เห็นชื่อจังหวัดชัดขึ้น
                    center: [100.5, 15] // ศูนย์กลางประเทศไทย
                });

                // --- เพิ่มส่วนควบคุมภาษา ---
                // บังคับให้แผนที่พยายามใช้ภาษาไทย (th) ในทุกสไตล์ที่โหลด
                const languagePlugin = new MapboxLanguage({
                    defaultLanguage: 'th'
                });
                map.addControl(languagePlugin);

                // เพิ่มปุ่มซูมและเข็มทิศ
                map.addControl(new mapboxgl.NavigationControl(), 'top-right');
                map.scrollZoom.disable(); 

                // ฟังก์ชันตั้งค่าชั้นบรรยากาศ (Fog) ให้สีเข้ากับโหมด
                function updateFog() {
                    if (isDarkMode) {
                        map.setFog({
                            'color': 'rgb(25, 35, 50)', 
                            'high-color': 'rgb(15, 25, 40)', 
                            'space-color': 'rgb(11, 11, 25)',
                            'star-intensity': 0.8
                        });
                    } else {
                        map.setFog({
                            'color': 'rgb(186, 210, 235)', 
                            'high-color': 'rgb(36, 92, 223)', 
                            'space-color': 'rgb(220, 230, 240)',
                            'star-intensity': 0.0
                        });
                    }
                }

                map.on('style.load', () => {
                    updateFog();
                });

                // การทำงานของปุ่มสลับโหมด
                const toggleBtn = document.getElementById('theme-toggle');
                toggleBtn.addEventListener('click', () => {
                    isDarkMode = !isDarkMode;
                    
                    if (isDarkMode) {
                        map.setStyle(darkStyle);
                        toggleBtn.innerText = '☀️ เปลี่ยนเป็นโหมดสว่าง';
                        toggleBtn.classList.add('dark-btn');
                    } else {
                        map.setStyle(lightStyle);
                        toggleBtn.innerText = '🌙 เปลี่ยนเป็นโหมดมืด';
                        toggleBtn.classList.remove('dark-btn');
                    }
                });

            } catch (error) {
                console.error("เกิดข้อผิดพลาดในการโหลดแผนที่:", error);
            }
        };
    </script>
</body>
</html>
