<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <title>Smart 3D Navigation Bridge</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <!-- Mapbox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    
    <!-- Mapbox Plugins -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-language/v1.0.0/mapbox-gl-language.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.1/mapbox-gl-directions.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.1/mapbox-gl-directions.css" type="text/css">

    <!-- Turf.js (สำหรับสร้างโมเดลถนนและตอม่อ 3D) -->
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');

        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; overflow: hidden; background-color: #000; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* หน้าจอโหลดข้อมูล (Loading Screen) */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 9999;
            display: none; /* ซ่อนไว้เป็นค่าเริ่มต้น */
            flex-direction: column; justify-content: center; align-items: center;
            color: #00F2FE;
        }
        .spinner {
            width: 60px; height: 60px;
            border: 6px solid rgba(0, 242, 254, 0.2);
            border-top: 6px solid #00F2FE;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Glassmorphism Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
        }
        .dark-mode .glass-panel { background: rgba(20, 25, 35, 0.85); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }

        /* Gradient Icons */
        .icon-gradient {
            background: linear-gradient(135deg, #FF007A, #7928CA);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 24px;
        }
        .dark-mode .icon-gradient { background: linear-gradient(135deg, #00F2FE, #4FACFE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Controls */
        #ui-controls { position: absolute; bottom: 30px; left: 20px; z-index: 2; display: flex; flex-direction: column; gap: 12px; }
        .action-btn { display: flex; align-items: center; gap: 10px; padding: 12px 20px; border: none; cursor: pointer; font-family: 'Kanit', sans-serif; font-weight: 500; font-size: 15px; transition: all 0.3s ease; }
        .action-btn:hover { transform: translateY(-3px); }
        
        #start-journey-btn { background: linear-gradient(135deg, #00C9FF, #92FE9D); color: #000; font-weight: bold; display: none; animation: pulse 2s infinite; }
        #start-journey-btn .icon-gradient { background: none; -webkit-text-fill-color: #000; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 201, 255, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(0, 201, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 201, 255, 0); } }

        /* Turn Markers */
        .turn-marker { width: 18px; height: 18px; background: linear-gradient(135deg, #FFD700, #FF8C00); border: 3px solid white; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.2s; }
        .turn-marker:hover { transform: scale(1.2); }

        /* Mapbox Directions / Popups */
        .mapboxgl-popup-content { border-radius: 12px; padding: 10px; font-family: 'Kanit', sans-serif; }
        .dark-mode .mapboxgl-popup-content { background: #1a2530; color: white; }
        .dark-mode .mapboxgl-popup-tip { border-top-color: #1a2530; border-bottom-color: #1a2530; }

        .mapboxgl-ctrl-directions { background: transparent !important; box-shadow: none !important; margin: 20px !important; max-width: 320px !important; width: 100% !important; }
        .mapbox-directions-inputs, .mapbox-directions-instructions { background: rgba(255, 255, 255, 0.9) !important; backdrop-filter: blur(12px) !important; border-radius: 16px !important; border: 1px solid rgba(255, 255, 255, 0.5) !important; margin-bottom: 10px; }
        .dark-mode .mapbox-directions-inputs, .dark-mode .mapbox-directions-instructions { background: rgba(20, 25, 35, 0.9) !important; color: white !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; }
        
        .hidden-panel { display: none !important; }
        .locked-mode .mapbox-directions-inputs { display: none !important; }
        .locked-mode .mapbox-directions-instructions { pointer-events: auto; }
        
        @media (max-width: 600px) {
            .mapboxgl-ctrl-directions { margin: 10px !important; max-width: calc(100% - 20px) !important; }
            #ui-controls { bottom: 15px; left: 10px; right: 55px; }
            .action-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body class="dark-mode">

    <!-- หน้าจอโหลด -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <h2 style="font-weight: 500;">กำลังสร้างโครงสร้างสะพาน 3D...</h2>
        <p style="font-weight: 300; font-size: 14px; opacity: 0.8;">กรุณารอสักครู่</p>
    </div>

    <div id="map"></div>
    
    <div id="ui-controls">
        <button id="start-journey-btn" class="glass-panel action-btn">
            <i class="ph-fill ph-rocket icon-gradient"></i> เริ่มการเดินทาง
        </button>
        <button id="toggle-instructions-btn" class="glass-panel action-btn" style="display: none;">
            <i class="ph-fill ph-list-dashes icon-gradient"></i> <span id="toggle-text">ซ่อนป้ายบอกทาง</span>
        </button>
        <button id="camera-toggle" class="glass-panel action-btn">
            <i class="ph-fill ph-cube icon-gradient"></i> มุมมอง 3D นำทาง
        </button>
        <button id="theme-toggle" class="glass-panel action-btn">
            <i class="ph-fill ph-sun icon-gradient" id="theme-icon"></i> <span id="theme-text">โหมดสว่าง</span>
        </button>
    </div>

    <script>
        // ฟังก์ชันถอดรหัสเส้นทาง (Decode Polyline) แก้ปัญหาเส้นทางไม่ขึ้น
        function decodePolyline(str, precision) {
            let index = 0, lat = 0, lng = 0, coordinates = [], shift = 0, result = 0, byte = null;
            let latitude_change, longitude_change, factor = Math.pow(10, precision || 5);
            while (index < str.length) {
                byte = null; shift = 0; result = 0;
                do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
                latitude_change = ((result & 1) ? ~(result >> 1) : (result >> 1));
                shift = result = 0;
                do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
                longitude_change = ((result & 1) ? ~(result >> 1) : (result >> 1));
                lat += latitude_change; lng += longitude_change;
                coordinates.push([lng / factor, lat / factor]);
            }
            return coordinates;
        }

        window.onload = function() {
            try {
                mapboxgl.accessToken = 'pk.eyJ1IjoiY2hhaXlhbmFuIiwiYSI6ImNtbndoeHlvbjA4ZHMycm9qajRyd3E5eGoifQ.Ua-_6wwmhrF0I6k-oZSfEg';
                
                const lightStyle = 'mapbox://styles/mapbox/streets-v12';
                const darkStyle = 'mapbox://styles/mapbox/navigation-night-v1';
                let isDarkMode = true; 
                
                // เก็บข้อมูลเส้นทางไว้ เผื่อมีการเปลี่ยนโหมดสี จะได้วาดใหม่ได้
                let currentRouteCoords = null; 
                let turnMarkers = [];
                let currentSteps = null;

                const map = new mapboxgl.Map({
                    container: 'map', style: darkStyle, projection: 'globe', 
                    zoom: 14, pitch: 65, bearing: -15, center: [100.523, 13.733] 
                });

                const directions = new MapboxDirections({
                    accessToken: mapboxgl.accessToken, unit: 'metric', profile: 'mapbox/driving', language: 'th',
                    alternatives: false, interactive: false,
                    placeholderOrigin: 'จุดเริ่มต้นการเดินทาง', placeholderDestination: 'จุดหมายปลายทาง'
                });
                
                map.addControl(directions, 'top-left');
                map.addControl(new mapboxgl.GeolocateControl({ positionOptions: { enableHighAccuracy: true }, trackUserLocation: true }), 'bottom-right');
                map.addControl(new mapboxgl.NavigationControl({ visualizePitch: true }), 'bottom-right');
                map.scrollZoom.disable();

                // สร้าง 3D ตึก
                function add3DBuildings() {
                    if (!map.getLayer('3d-buildings')) {
                        let labelId;
                        map.getStyle().layers.forEach(l => { if (l.type === 'symbol' && l.layout['text-field']) labelId = l.id; });
                        map.addLayer({
                            'id': '3d-buildings', 'source': 'composite', 'source-layer': 'building',
                            'filter': ['==', 'extrude', 'true'], 'type': 'fill-extrusion', 'minzoom': 15,
                            'paint': {
                                'fill-extrusion-color': isDarkMode ? '#1e293b' : '#e2e8f0',
                                'fill-extrusion-height': ['interpolate', ['linear'], ['zoom'], 15, 0, 15.05, ['get', 'height']],
                                'fill-extrusion-base': ['interpolate', ['linear'], ['zoom'], 15, 0, 15.05, ['get', 'min_height']],
                                'fill-extrusion-opacity': 0.7
                            }
                        }, labelId);
                    }
                }

                // สร้างถนน 3D (เรียกซ้ำได้เมื่อสลับโหมดสี)
                function render3DRouteOnMap() {
                    if (!currentRouteCoords) return;

                    // ป้องกัน Error หากเส้นทางสั้นเกินไป
                    if (currentRouteCoords.length < 2) return;

                    const line = turf.lineString(currentRouteCoords);
                    const roadPolygon = turf.buffer(line, 6, { units: 'meters' }); 

                    const routeLength = turf.length(line, { units: 'meters' });
                    const pillars = [];
                    // สร้างเสาปูนทุกๆ 50 เมตร
                    if (routeLength > 50) {
                        for (let i = 25; i < routeLength; i += 50) {
                            const pt = turf.along(line, i, { units: 'meters' });
                            pillars.push(turf.buffer(pt, 1.5, { units: 'meters' })); // รัศมีเสา
                        }
                    }

                    if (map.getLayer('custom-3d-route')) map.removeLayer('custom-3d-route');
                    if (map.getSource('custom-3d-route')) map.removeSource('custom-3d-route');
                    if (map.getLayer('custom-3d-pillars')) map.removeLayer('custom-3d-pillars');
                    if (map.getSource('custom-3d-pillars')) map.removeSource('custom-3d-pillars');

                    // เพิ่มเลเยอร์ ถนนลอยฟ้า (ลอยที่ความสูง 12-13.5 เมตร)
                    map.addSource('custom-3d-route', { type: 'geojson', data: roadPolygon });
                    map.addLayer({
                        'id': 'custom-3d-route', 'type': 'fill-extrusion', 'source': 'custom-3d-route',
                        'paint': {
                            'fill-extrusion-color': '#00F2FE', 
                            'fill-extrusion-height': 13.5, 
                            'fill-extrusion-base': 12, 
                            'fill-extrusion-opacity': 0.95
                        }
                    });

                    // เพิ่มเลเยอร์ ตอม่อ (ยิงจากพื้น 0 ไปชนฐาน 12 เมตร)
                    if (pillars.length > 0) {
                        map.addSource('custom-3d-pillars', { type: 'geojson', data: turf.featureCollection(pillars) });
                        map.addLayer({
                            'id': 'custom-3d-pillars', 'type': 'fill-extrusion', 'source': 'custom-3d-pillars',
                            'paint': {
                                'fill-extrusion-color': isDarkMode ? '#475569' : '#94a3b8',
                                'fill-extrusion-height': 12, 'fill-extrusion-base': 0, 'fill-extrusion-opacity': 0.9
                            }
                        });
                    }

                    // ซ่อนเส้นนำทาง 2D ของ Mapbox ทิ้งไป เพื่อไม่ให้ทับซ้อนกับ 3D
                    setTimeout(() => {
                        map.getStyle().layers.forEach(l => {
                            if (l.id.includes('directions-route-line')) {
                                map.setLayoutProperty(l.id, 'visibility', 'none');
                            }
                        });
                    }, 100);
                }

                // เมื่อโหลดสไตล์เสร็จ (รวมถึงเวลาเปลี่ยนสว่าง/มืด)
                map.on('style.load', () => {
                    map.setFog({
                        'color': isDarkMode ? 'rgb(25, 35, 50)' : 'rgb(186, 210, 235)', 
                        'high-color': isDarkMode ? 'rgb(15, 25, 40)' : 'rgb(36, 92, 223)', 
                        'space-color': isDarkMode ? 'rgb(11, 11, 25)' : 'rgb(220, 230, 240)',
                        'star-intensity': isDarkMode ? 0.8 : 0.0
                    });
                    add3DBuildings();
                    map.addControl(new MapboxLanguage({ defaultLanguage: 'th' }));
                    
                    map.getStyle().layers.forEach(layer => {
                        if (layer.type === 'symbol' && layer.layout && layer.layout['text-field'] && !layer.id.includes('shield')) {
                            try { map.setLayoutProperty(layer.id, 'text-field', ['coalesce', ['get', 'name_th'], ['get', 'name']]); } catch(e){}
                        }
                    });

                    // หากมีเส้นทางค้างอยู่ ให้สร้าง 3D กลับมาใหม่
                    render3DRouteOnMap();
                });

                // --- เมื่อคำนวณเส้นทางเสร็จ ---
                directions.on('route', (e) => {
                    if (!e.route || !e.route[0]) return;
                    
                    // 1. เปิดหน้าจอโหลด
                    document.getElementById('loading-overlay').style.display = 'flex';
                    turnMarkers.forEach(m => m.remove()); turnMarkers = [];
                    
                    // ใช้ setTimeout ให้มีเวลาวาดแอนิเมชันโหลด
                    setTimeout(() => {
                        try {
                            // ถอดรหัสพิกัดเส้นทาง
                            const geo = e.route[0].geometry;
                            if (typeof geo === 'string') {
                                currentRouteCoords = decodePolyline(geo);
                            } else {
                                currentRouteCoords = geo.coordinates;
                            }
                            
                            // 2. สร้างโครงสร้าง 3D
                            render3DRouteOnMap();

                            // 3. วาดจุด Pop-up ทางแยก
                            currentSteps = e.route[0].legs[0].steps;
                            currentSteps.forEach(step => {
                                const loc = step.maneuver.location;
                                const instruction = step.maneuver.instruction;
                                const imgUrl = `https://api.mapbox.com/styles/v1/mapbox/satellite-streets-v12/static/${loc[0]},${loc[1]},18,0,0/250x140?access_token=${mapboxgl.accessToken}`;

                                const popupHTML = `
                                    <div style="text-align:center;">
                                        <p style="font-size:14px; font-weight:600; margin: 0 0 8px 0; color:#333;">${instruction}</p>
                                        <img src="${imgUrl}" style="width:100%; height:140px; border-radius:8px; object-fit:cover;">
                                    </div>
                                `;

                                const el = document.createElement('div'); el.className = 'turn-marker';
                                const popup = new mapboxgl.Popup({ offset: 15, closeButton: false, maxWidth: '260px' }).setHTML(popupHTML);
                                const marker = new mapboxgl.Marker(el).setLngLat(loc).setPopup(popup).addTo(map);
                                turnMarkers.push(marker);
                            });

                            // ปิดหน้าจอโหลด และแสดงปุ่มเริ่มเดินทาง
                            document.getElementById('loading-overlay').style.display = 'none';
                            document.getElementById('start-journey-btn').style.display = 'flex';
                            document.body.classList.remove('locked-mode');

                        } catch (err) {
                            console.error("สร้าง 3D ล้มเหลว:", err);
                            document.getElementById('loading-overlay').style.display = 'none';
                        }
                    }, 1200); // ดีเลย์ 1.2 วินาทีให้เห็นการโหลดและให้ Mapbox วาด 2D ทิ้งไว้ก่อนเราจะไปซ่อนมัน
                });

                directions.on('clear', () => {
                    currentRouteCoords = null;
                    turnMarkers.forEach(m => m.remove()); turnMarkers = [];
                    if (map.getLayer('custom-3d-route')) map.removeLayer('custom-3d-route');
                    if (map.getLayer('custom-3d-pillars')) map.removeLayer('custom-3d-pillars');
                    document.getElementById('start-journey-btn').style.display = 'none';
                    document.getElementById('toggle-instructions-btn').style.display = 'none';
                    document.body.classList.remove('locked-mode');
                });

                // --- UI Button Listeners ---
                document.getElementById('start-journey-btn').addEventListener('click', () => {
                    document.body.classList.add('locked-mode');
                    document.getElementById('start-journey-btn').style.display = 'none';
                    document.getElementById('toggle-instructions-btn').style.display = 'flex';
                    
                    const origin = directions.getOrigin().geometry.coordinates;
                    map.flyTo({ center: origin, zoom: 17, pitch: 75, bearing: map.getBearing() + 15, duration: 2500 });
                });

                document.getElementById('toggle-instructions-btn').addEventListener('click', () => {
                    const inst = document.querySelector('.mapbox-directions-instructions');
                    const text = document.getElementById('toggle-text');
                    if (inst.classList.contains('hidden-panel')) {
                        inst.classList.remove('hidden-panel'); text.innerText = 'ซ่อนป้ายบอกทาง';
                    } else {
                        inst.classList.add('hidden-panel'); text.innerText = 'แสดงป้ายบอกทาง';
                    }
                });

                document.getElementById('theme-toggle').addEventListener('click', () => {
                    isDarkMode = !isDarkMode;
                    document.body.classList.toggle('dark-mode');
                    const icon = document.getElementById('theme-icon');
                    const text = document.getElementById('theme-text');

                    if (isDarkMode) {
                        map.setStyle(darkStyle);
                        icon.className = 'ph-fill ph-sun icon-gradient'; text.innerText = 'โหมดสว่าง';
                    } else {
                        map.setStyle(lightStyle);
                        icon.className = 'ph-fill ph-moon-stars icon-gradient'; text.innerText = 'โหมดกลางคืน';
                    }
                });

                document.getElementById('camera-toggle').addEventListener('click', () => {
                    map.easeTo({ pitch: 65, bearing: -15, duration: 1000 });
                });

            } catch (error) {
                console.error("เกิดข้อผิดพลาดในการโหลดแผนที่:", error);
            }
        };
    </script>
</body>
</html>
