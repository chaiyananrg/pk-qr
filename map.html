<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <title>Mapbox - 3D Routing, Mobile Friendly & Satellite Popups</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <!-- Mapbox GL JS v2.15.0 -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    
    <!-- Mapbox GL Language Plugin -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-language/v1.0.0/mapbox-gl-language.js"></script>

    <!-- Mapbox GL Directions Plugin -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.1/mapbox-gl-directions.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.1/mapbox-gl-directions.css" type="text/css">

    <style>
        body { margin: 0; padding: 0; background-color: #111; font-family: sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* จัดกลุ่มปุ่มด้านล่าง */
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 1;
            display: flex;
            gap: 10px;
        }

        /* สไตล์ปุ่มทั่วไป */
        .btn-control {
            background-color: #ffffff;
            color: #333333;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }
        .btn-control:hover { background-color: #f0f0f0; transform: translateY(-2px); }
        .dark-btn { background-color: #1a2530 !important; color: #ffffff !important; border: 1px solid #334155 !important; }
        .dark-btn:hover { background-color: #2c3e50 !important; }

        /* สไตล์สำหรับจุดมาร์กเกอร์เลี้ยว */
        .turn-marker {
            width: 14px;
            height: 14px;
            background-color: #ffcc00;
            border: 2px solid #ffffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        /* ปรับแต่งสำหรับหน้าจอมือถือ (Mobile Responsive) */
        @media (max-width: 600px) {
            /* ย่อขนาดและปรับตำแหน่งกล่องค้นหานำทาง */
            .mapboxgl-ctrl-top-left { top: 10px; left: 10px; right: 10px; }
            .mapboxgl-ctrl-directions { max-width: 100% !important; width: 100% !important; margin: 0 !important; }
            
            /* ปรับปุ่มด้านล่างให้เรียงกันและกว้างเต็มจอ */
            #ui-container { bottom: 15px; left: 10px; right: 60px; /* เว้นที่ให้ปุ่ม GPS */ flex-direction: column; gap: 8px; }
            .btn-control { width: 100%; font-size: 13px; padding: 12px; }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div id="ui-container">
        <button id="theme-toggle" class="btn-control">🌙 โหมดมืด</button>
        <button id="camera-toggle" class="btn-control">🚁 มุมมอง 3D</button>
    </div>

    <script>
        window.onload = function() {
            try {
                mapboxgl.accessToken = 'pk.eyJ1IjoiY2hhaXlhbmFuIiwiYSI6ImNtbndoeHlvbjA4ZHMycm9qajRyd3E5eGoifQ.Ua-_6wwmhrF0I6k-oZSfEg';
                
                const lightStyle = 'mapbox://styles/mapbox/streets-v12';
                const darkStyle = 'mapbox://styles/mapbox/navigation-night-v1';
                let isDarkMode = false;
                let turnMarkers = []; // เก็บ Marker จุดเลี้ยว

                const map = new mapboxgl.Map({
                    container: 'map',
                    style: lightStyle, 
                    projection: 'globe', 
                    zoom: 14, 
                    pitch: 60, // มุมเงย
                    bearing: -15, // ทิศทาง
                    center: [100.523, 13.733] // กทม.
                });

                // ระบบนำทาง
                const directions = new MapboxDirections({
                    accessToken: mapboxgl.accessToken,
                    unit: 'metric',
                    profile: 'mapbox/driving',
                    language: 'th', 
                    placeholderOrigin: 'ระบุจุดเริ่มต้น...',
                    placeholderDestination: 'ระบุจุดหมายปลายทาง...'
                });
                map.addControl(directions, 'top-left');

                // ปุ่มตำแหน่งปัจจุบัน (GPS)
                const geolocate = new mapboxgl.GeolocateControl({
                    positionOptions: { enableHighAccuracy: true },
                    trackUserLocation: true,
                    showUserHeading: true
                });
                map.addControl(geolocate, 'bottom-right');

                // ปุ่มซูมเข้า-ออก
                map.addControl(new mapboxgl.NavigationControl({ visualizePitch: true }), 'bottom-right');
                map.scrollZoom.disable(); // กันเผลอซูมด้วยลูกกลิ้งเมาส์

                // ฟังก์ชันวาดตึก 3D
                function add3DBuildings() {
                    if (!map.getLayer('3d-buildings')) {
                        const layers = map.getStyle().layers;
                        let labelLayerId;
                        for (let i = 0; i < layers.length; i++) {
                            if (layers[i].type === 'symbol' && layers[i].layout['text-field']) {
                                labelLayerId = layers[i].id;
                                break;
                            }
                        }

                        map.addLayer({
                            'id': '3d-buildings',
                            'source': 'composite',
                            'source-layer': 'building',
                            'filter': ['==', 'extrude', 'true'],
                            'type': 'fill-extrusion',
                            'minzoom': 15,
                            'paint': {
                                'fill-extrusion-color': isDarkMode ? '#2c3e50' : '#e0e0e0',
                                'fill-extrusion-height': [
                                    'interpolate', ['linear'], ['zoom'],
                                    15, 0, 15.05, ['get', 'height']
                                ],
                                'fill-extrusion-base': [
                                    'interpolate', ['linear'], ['zoom'],
                                    15, 0, 15.05, ['get', 'min_height']
                                ],
                                'fill-extrusion-opacity': 0.8
                            }
                        }, labelLayerId);
                    }
                }

                // การตั้งค่าหลังแผนที่โหลดเสร็จ
                map.on('style.load', () => {
                    map.setFog({
                        'color': isDarkMode ? 'rgb(25, 35, 50)' : 'rgb(186, 210, 235)', 
                        'high-color': isDarkMode ? 'rgb(15, 25, 40)' : 'rgb(36, 92, 223)', 
                        'space-color': isDarkMode ? 'rgb(11, 11, 25)' : 'rgb(220, 230, 240)',
                        'star-intensity': isDarkMode ? 0.8 : 0.0
                    });

                    add3DBuildings();

                    // บังคับภาษาไทย
                    const layers = map.getStyle().layers;
                    layers.forEach(layer => {
                        if (layer.type === 'symbol' && layer.layout && layer.layout['text-field']) {
                            const layerId = layer.id.toLowerCase();
                            if (layerId.includes('label') && !layerId.includes('shield')) {
                                try {
                                    map.setLayoutProperty(layer.id, 'text-field', [
                                        'coalesce', ['get', 'name_th'], ['get', 'name']
                                    ]);
                                } catch (e) {}
                            }
                        }
                    });
                });

                // --- ฟีเจอร์: แสดงภาพดาวเทียมตรงจุดเลี้ยว (Maneuvers) ---
                directions.on('route', (e) => {
                    // ลบ Marker เก่าออกก่อน
                    turnMarkers.forEach(marker => marker.remove());
                    turnMarkers = [];

                    if (!e.route || !e.route[0]) return;
                    
                    const steps = e.route[0].legs[0].steps;
                    
                    steps.forEach(step => {
                        const coords = step.maneuver.location;
                        const instruction = step.maneuver.instruction;
                        
                        // สร้าง URL ขอดึงภาพดาวเทียมแบบ Static จาก Mapbox
                        // ซูมระดับ 18 กว้าง 250px สูง 150px
                        const staticImgUrl = `https://api.mapbox.com/styles/v1/mapbox/satellite-streets-v12/static/${coords[0]},${coords[1]},18,0,0/250x150?access_token=${mapboxgl.accessToken}`;

                        // สร้าง HTML สำหรับหน้าต่าง Pop-up
                        const popupHTML = `
                            <div style="text-align:center; padding: 5px;">
                                <p style="font-size:13px; font-weight:bold; margin: 0 0 8px 0; color:#333;">${instruction}</p>
                                <img src="${staticImgUrl}" alt="Satellite View" style="width:250px; height:150px; border-radius:6px; border: 1px solid #ccc; object-fit:cover;" onerror="this.style.display='none'">
                                <p style="font-size:10px; color:#888; margin: 5px 0 0 0;">ภาพดาวเทียมจาก Mapbox</p>
                            </div>
                        `;

                        // สร้างจุดกลมๆ สีเหลือง
                        const el = document.createElement('div');
                        el.className = 'turn-marker';

                        // กำหนด Popup และ Marker
                        const popup = new mapboxgl.Popup({ offset: 10, maxWidth: '280px' }).setHTML(popupHTML);
                        const marker = new mapboxgl.Marker(el)
                            .setLngLat(coords)
                            .setPopup(popup)
                            .addTo(map);

                        turnMarkers.push(marker);
                    });
                });

                // เมื่อล้างเส้นทาง ให้ลบ Marker ด้วย
                directions.on('clear', () => {
                    turnMarkers.forEach(marker => marker.remove());
                    turnMarkers = [];
                });

                // --- ปุ่มควบคุม ---
                document.getElementById('theme-toggle').addEventListener('click', () => {
                    isDarkMode = !isDarkMode;
                    const btn = document.getElementById('theme-toggle');
                    if (isDarkMode) {
                        map.setStyle(darkStyle);
                        btn.innerText = '☀️ โหมดสว่าง';
                        btn.classList.add('dark-btn');
                    } else {
                        map.setStyle(lightStyle);
                        btn.innerText = '🌙 โหมดมืด';
                        btn.classList.remove('dark-btn');
                    }
                });

                // ปุ่มสำหรับดึงมุมกล้องกลับมาที่ 3D ทันที
                document.getElementById('camera-toggle').addEventListener('click', () => {
                    map.easeTo({
                        pitch: 60,
                        bearing: -15,
                        duration: 1200 // ใช้เวลาเลื่อนกล้อง 1.2 วินาทีเพื่อให้ดูนุ่มนวล
                    });
                });

            } catch (error) {
                console.error("เกิดข้อผิดพลาดในการโหลดแผนที่:", error);
            }
        };
    </script>
</body>
</html>
