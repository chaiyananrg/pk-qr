<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <title>Free Smart 3D Navigation (No Key)</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <!-- นำเข้า MapLibre GL JS (ทางเลือกฟรีแทน Mapbox) -->
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <!-- Turf.js (สำหรับคำนวณสร้างโมเดลถนน 3D) -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');

        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; overflow: hidden; background-color: #000; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* --- หน้าจอโหลดข้อมูล (Loading Screen) --- */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; color: #00F2FE;
        }
        .spinner { width: 70px; height: 70px; border: 6px solid rgba(0, 242, 254, 0.1); border-top: 6px solid #00F2FE; border-bottom: 6px solid #4FACFE; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.5); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { font-size: 20px; font-weight: 500; text-shadow: 0 0 10px rgba(0,242,254,0.5); margin: 0; }
        .loading-subtext { font-size: 14px; color: #aaa; margin-top: 8px; }

        /* Glassmorphism Panels */
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 16px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15); }
        .dark-mode .glass-panel { background: rgba(20, 25, 35, 0.85); border: 1px solid rgba(255, 255, 255, 0.1); color: white; }

        /* Gradient Icons */
        .icon-gradient { background: linear-gradient(135deg, #FF007A, #7928CA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 24px; }
        .dark-mode .icon-gradient { background: linear-gradient(135deg, #00F2FE, #4FACFE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Controls */
        #ui-controls { position: absolute; bottom: 30px; left: 20px; z-index: 2; display: flex; flex-direction: column; gap: 12px; }
        .action-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 20px; border: none; cursor: pointer; font-family: 'Kanit', sans-serif; font-weight: 500; font-size: 15px; transition: all 0.3s ease; }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        #start-journey-btn { background: linear-gradient(135deg, #00C9FF, #92FE9D); color: #000; font-weight: bold; display: none; animation: pulse 2s infinite; }
        #start-journey-btn .icon-gradient { background: none; -webkit-text-fill-color: #000; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 201, 255, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(0, 201, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 201, 255, 0); } }

        /* Custom Search UI (เนื่องจากไม่ได้ใช้ Mapbox Directions) */
        #search-container { position: absolute; top: 20px; left: 20px; z-index: 2; width: 320px; display: flex; flex-direction: column; gap: 10px; }
        .search-input { width: 100%; padding: 12px 15px; border: none; border-radius: 12px; font-family: 'Kanit', sans-serif; font-size: 14px; outline: none; box-sizing: border-box; }
        .dark-mode .search-input { background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.2); }
        #route-info { display: none; padding: 15px; font-size: 14px; max-height: 200px; overflow-y: auto; }
        
        .locked-mode #search-container .search-input, .locked-mode #search-container .search-btn { display: none; }
        .hidden-panel { display: none !important; }

        /* Turn Markers & Popups */
        .turn-marker { width: 16px; height: 16px; background: linear-gradient(135deg, #FFD700, #FF8C00); border: 2px solid white; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.2s; }
        .turn-marker:hover { transform: scale(1.3); }
        .maplibregl-popup-content { border-radius: 12px; padding: 10px; font-family: 'Kanit', sans-serif; }
        .dark-mode .maplibregl-popup-content { background: #1a2530; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .dark-mode .maplibregl-popup-tip { border-top-color: #1a2530; border-bottom-color: #1a2530; }

        @media (max-width: 600px) {
            #search-container { width: calc(100% - 40px); }
            #ui-controls { bottom: 15px; left: 10px; right: 55px; }
            .action-btn { width: 100%; }
        }
    </style>
</head>
<body class="dark-mode">

    <!-- Loading Screen -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="loading-text">กำลังสร้างโครงสร้างสะพาน 3D</p>
        <p class="loading-subtext">ประมวลผลเส้นทางด้วย OSRM...</p>
    </div>

    <div id="map"></div>

    <!-- UI ค้นหาสถานที่ทำเอง -->
    <div id="search-container">
        <input type="text" id="origin-input" class="glass-panel search-input" placeholder="พิกัดเริ่มต้น (เช่น 100.523,13.733)">
        <input type="text" id="dest-input" class="glass-panel search-input" placeholder="พิกัดปลายทาง (เช่น 100.539,13.746)">
        <button id="search-btn" class="glass-panel action-btn" style="width: 100%;">
            <i class="ph-fill ph-magnifying-glass icon-gradient"></i> ค้นหาเส้นทาง
        </button>
        <div id="route-info" class="glass-panel">
            <div id="route-details" style="font-weight: 600; margin-bottom: 10px; color: #00F2FE;"></div>
            <div id="route-steps"></div>
        </div>
    </div>
    
    <!-- UI Controls -->
    <div id="ui-controls">
        <button id="start-journey-btn" class="glass-panel action-btn">
            <i class="ph-fill ph-rocket icon-gradient"></i> เริ่มการเดินทาง
        </button>
        <button id="toggle-instructions-btn" class="glass-panel action-btn" style="display: none;">
            <i class="ph-fill ph-list-dashes icon-gradient"></i> <span id="toggle-text">ซ่อนป้ายบอกทาง</span>
        </button>
        <button id="camera-toggle" class="glass-panel action-btn">
            <i class="ph-fill ph-cube icon-gradient"></i> มุมมอง 3D นำทาง
        </button>
        <button id="theme-toggle" class="glass-panel action-btn">
            <i class="ph-fill ph-sun icon-gradient" id="theme-icon"></i> <span id="theme-text">โหมดสว่าง</span>
        </button>
    </div>

    <script>
        window.onload = function() {
            try {
                // ใช้สไตล์ฟรีจาก Maptiler (ไม่ต้องใช้คีย์สำหรับการทดสอบเบื้องต้น บางแหล่งอาจมีการจำกัดปริมาณ)
                // เราใช้สไตล์พื้นฐานของ MapLibre ควบคู่กับข้อมูล OpenStreetMap
                const styleUrl = 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json';
                const lightStyleUrl = 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json';

                let isDarkMode = true; 
                let turnMarkers = [];
                let currentRouteCoords = null;

                const map = new maplibregl.Map({
                    container: 'map',
                    style: styleUrl,
                    zoom: 14, pitch: 65, bearing: -15,
                    center: [100.523, 13.733] // สามย่าน/จุฬา กทม.
                });

                map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'bottom-right');

                // ฟังก์ชันดึงข้อมูลเส้นทางฟรีจาก OSRM (Open Source Routing Machine)
                async function fetchRouteFromOSRM(startLng, startLat, endLng, endLat) {
                    const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${startLng},${startLat};${endLng},${endLat}?overview=full&geometries=geojson&steps=true`;
                    const response = await fetch(osrmUrl);
                    const data = await response.json();
                    return data;
                }

                function render3DRouteOnMap(coords) {
                    if (!coords || coords.length < 2) return;

                    const line = turf.lineString(coords);
                    const roadPolygon = turf.buffer(line, 4, { units: 'meters' }); 

                    const routeLength = turf.length(line, { units: 'meters' });
                    const pillars = [];
                    if (routeLength > 60) {
                        for (let i = 20; i < routeLength; i += 60) {
                            const pt = turf.along(line, i, { units: 'meters' });
                            pillars.push(turf.buffer(pt, 2, { units: 'meters' })); 
                        }
                    }

                    if (map.getLayer('custom-3d-route')) map.removeLayer('custom-3d-route');
                    if (map.getSource('custom-3d-route')) map.removeSource('custom-3d-route');
                    if (map.getLayer('custom-3d-pillars')) map.removeLayer('custom-3d-pillars');
                    if (map.getSource('custom-3d-pillars')) map.removeSource('custom-3d-pillars');

                    map.addSource('custom-3d-route', { type: 'geojson', data: roadPolygon });
                    map.addLayer({
                        'id': 'custom-3d-route', 'type': 'fill-extrusion', 'source': 'custom-3d-route',
                        'paint': {
                            'fill-extrusion-color': '#00F2FE', 
                            'fill-extrusion-height': 16, 
                            'fill-extrusion-base': 15, 
                            'fill-extrusion-opacity': 0.95
                        }
                    });

                    if (pillars.length > 0) {
                        map.addSource('custom-3d-pillars', { type: 'geojson', data: turf.featureCollection(pillars) });
                        map.addLayer({
                            'id': 'custom-3d-pillars', 'type': 'fill-extrusion', 'source': 'custom-3d-pillars',
                            'paint': {
                                'fill-extrusion-color': isDarkMode ? '#475569' : '#94a3b8',
                                'fill-extrusion-height': 15, 'fill-extrusion-base': 0, 'fill-extrusion-opacity': 0.9
                            }
                        });
                    }
                }

                map.on('style.load', () => {
                    // หากมีเส้นทางค้างอยู่ ให้สร้าง 3D กลับมาใหม่
                    if(currentRouteCoords) {
                        render3DRouteOnMap(currentRouteCoords);
                    }
                });

                // การค้นหาเส้นทาง
                document.getElementById('search-btn').addEventListener('click', async () => {
                    const originVal = document.getElementById('origin-input').value;
                    const destVal = document.getElementById('dest-input').value;

                    // ค่าเริ่มต้นหากไม่ได้กรอก (ทดสอบ: จากสามย่าน ไป เซ็นทรัลเวิลด์)
                    const start = originVal ? originVal.split(',') : [100.523, 13.733];
                    const end = destVal ? destVal.split(',') : [100.539, 13.746];

                    document.getElementById('loading-overlay').style.display = 'flex';
                    turnMarkers.forEach(m => m.remove()); turnMarkers = [];

                    try {
                        const routeData = await fetchRouteFromOSRM(start[0], start[1], end[0], end[1]);
                        
                        if(routeData.code === "Ok" && routeData.routes.length > 0) {
                            const route = routeData.routes[0];
                            currentRouteCoords = route.geometry.coordinates;

                            // แสดงข้อมูลระยะทาง
                            const distanceKm = (route.distance / 1000).toFixed(2);
                            const durationMin = Math.round(route.duration / 60);
                            document.getElementById('route-info').style.display = 'block';
                            document.getElementById('route-details').innerText = `ระยะทาง: ${distanceKm} กม. | เวลา: ${durationMin} นาที`;
                            
                            let stepsHtml = "";
                            const steps = route.legs[0].steps;
                            steps.forEach((step, index) => {
                                // เปลี่ยนคำภาษาอังกฤษจาก OSRM เป็นไทยเบื้องต้น
                                let type = step.maneuver.type;
                                let modifier = step.maneuver.modifier;
                                let thInst = `ขับไปตามทาง`;
                                if(type === "turn") thInst = `เลี้ยว${modifier === 'left' ? 'ซ้าย' : 'ขวา'}`;
                                if(type === "depart") thInst = "เริ่มต้นการเดินทาง";
                                if(type === "arrive") thInst = "ถึงจุดหมาย";
                                if(step.name) thInst += ` ไปที่ ${step.name}`;

                                stepsHtml += `<div style="padding:5px 0; border-bottom:1px solid rgba(128,128,128,0.3);">${index+1}. ${thInst}</div>`;

                                // วาดจุดเลี้ยวบนแผนที่ (ถ้าไม่ใช่เส้นตรงยาวๆ)
                                if(type === "turn" || type === "depart" || type === "arrive") {
                                    const loc = step.maneuver.location;
                                    const el = document.createElement('div'); el.className = 'turn-marker';
                                    
                                    // เนื่องจากไม่ได้ใช้ Mapbox จึงไม่มี Static Image API ฟรีที่คุณภาพสูง
                                    // จึงแสดงแค่ข้อความคำแนะนำแบบ 3D
                                    const popupHTML = `
                                        <div style="text-align:center;">
                                            <p style="font-size:14px; font-weight:600; margin: 0; color:#333;">${thInst}</p>
                                        </div>
                                    `;
                                    const popup = new maplibregl.Popup({ offset: 15, closeButton: false }).setHTML(popupHTML);
                                    const marker = new maplibregl.Marker({element: el}).setLngLat(loc).setPopup(popup).addTo(map);
                                    turnMarkers.push(marker);
                                }
                            });
                            document.getElementById('route-steps').innerHTML = stepsHtml;

                            // บินกล้องไปดูเส้นทางรวม
                            const bounds = new maplibregl.LngLatBounds();
                            currentRouteCoords.forEach(c => bounds.extend(c));
                            map.fitBounds(bounds, { padding: 50, pitch: 65 });

                            setTimeout(() => {
                                render3DRouteOnMap(currentRouteCoords);
                                document.getElementById('loading-overlay').style.display = 'none';
                                document.getElementById('start-journey-btn').style.display = 'flex';
                            }, 500);

                        } else {
                            alert("ไม่สามารถค้นหาเส้นทางได้ กรุณาตรวจสอบพิกัด");
                            document.getElementById('loading-overlay').style.display = 'none';
                        }

                    } catch (error) {
                        console.error("Error fetching route:", error);
                        alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบนำทาง");
                        document.getElementById('loading-overlay').style.display = 'none';
                    }
                });

                // --- UI Controls ---
                document.getElementById('start-journey-btn').addEventListener('click', () => {
                    document.body.classList.add('locked-mode');
                    document.getElementById('start-journey-btn').style.display = 'none';
                    document.getElementById('toggle-instructions-btn').style.display = 'flex';
                    
                    if(currentRouteCoords && currentRouteCoords.length > 0) {
                        const origin = currentRouteCoords[0];
                        map.flyTo({ center: origin, zoom: 17.5, pitch: 75, duration: 2500 });
                    }
                });

                document.getElementById('toggle-instructions-btn').addEventListener('click', () => {
                    const info = document.getElementById('route-info');
                    const text = document.getElementById('toggle-text');
                    if (info.classList.contains('hidden-panel')) {
                        info.classList.remove('hidden-panel'); text.innerText = 'ซ่อนป้ายบอกทาง';
                    } else {
                        info.classList.add('hidden-panel'); text.innerText = 'แสดงป้ายบอกทาง';
                    }
                });

                document.getElementById('theme-toggle').addEventListener('click', () => {
                    isDarkMode = !isDarkMode;
                    document.body.classList.toggle('dark-mode');
                    const icon = document.getElementById('theme-icon');
                    const text = document.getElementById('theme-text');

                    if (isDarkMode) {
                        map.setStyle(styleUrl);
                        icon.className = 'ph-fill ph-sun icon-gradient'; text.innerText = 'โหมดสว่าง';
                    } else {
                        map.setStyle(lightStyleUrl);
                        icon.className = 'ph-fill ph-moon-stars icon-gradient'; text.innerText = 'โหมดกลางคืน';
                    }
                });

                document.getElementById('camera-toggle').addEventListener('click', () => {
                    map.easeTo({ pitch: 65, duration: 1000 });
                });

            } catch (error) {
                console.error("เกิดข้อผิดพลาดในการโหลดระบบ:", error);
            }
        };
    </script>
</body>
</html>
