<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <title>Mapbox - 3D, Routing, Location & Thai</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <!-- Mapbox GL JS v2.15.0 -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    
    <!-- Mapbox GL Language Plugin -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-language/v1.0.0/mapbox-gl-language.js"></script>

    <!-- Mapbox GL Directions Plugin (สำหรับช่องกรอกจุดเริ่มต้นและปลายทาง) -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.1/mapbox-gl-directions.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.1/mapbox-gl-directions.css" type="text/css">

    <style>
        body { margin: 0; padding: 0; background-color: #111; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* สไตล์สำหรับปุ่มสลับโหมด ย้ายมามุมซ้ายล่าง */
        #theme-toggle {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 1;
            background-color: #ffffff;
            color: #333333;
            border: 1px solid #ccc;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        #theme-toggle:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
        }
        .dark-btn {
            background-color: #1a2530 !important;
            color: #ffffff !important;
            border: 1px solid #334155 !important;
        }
        .dark-btn:hover { background-color: #2c3e50 !important; }
        
        /* ปรับแต่งช่องกรอกข้อมูลนำทางให้อยู่ใต้ปุ่มหน่อย */
        .mapboxgl-ctrl-directions { margin-top: 20px !important; margin-left: 20px !important; }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="theme-toggle">🌙 เปลี่ยนเป็นโหมดมืด</button>

    <script>
        window.onload = function() {
            try {
                mapboxgl.accessToken = 'pk.eyJ1IjoiY2hhaXlhbmFuIiwiYSI6ImNtbndoeHlvbjA4ZHMycm9qajRyd3E5eGoifQ.Ua-_6wwmhrF0I6k-oZSfEg';
                
                const lightStyle = 'mapbox://styles/mapbox/streets-v12';
                const darkStyle = 'mapbox://styles/mapbox/navigation-night-v1';
                let isDarkMode = false;

                // สร้างแผนที่พร้อมปรับมุมมอง 3D เบื้องต้น (pitch 60 องศา)
                const map = new mapboxgl.Map({
                    container: 'map',
                    style: lightStyle, 
                    projection: 'globe', 
                    zoom: 13, // ซูมใกล้ขึ้นเพื่อให้เห็นตึก 3D
                    pitch: 60, // เอียงกล้อง 60 องศาเพื่อความเป็น 3D
                    bearing: -15, // หมุนกล้องเล็กน้อย
                    center: [100.523, 13.733] // ศูนย์กลาง กทม. (แถวๆ จุฬา/สามย่าน ที่มีตึกเยอะ)
                });

                // 1. เพิ่มระบบนำทาง (กล่องกรอก A ไป B)
                const directions = new MapboxDirections({
                    accessToken: mapboxgl.accessToken,
                    unit: 'metric',
                    profile: 'mapbox/driving',
                    language: 'th', // ตั้งค่าเมนูเป็นภาษาไทย
                    placeholderOrigin: 'จุดเริ่มต้น',
                    placeholderDestination: 'จุดที่จะไป'
                });
                map.addControl(directions, 'top-left');

                // 2. เพิ่มปุ่มระบุตำแหน่งปัจจุบัน (GPS)
                const geolocate = new mapboxgl.GeolocateControl({
                    positionOptions: { enableHighAccuracy: true }, // ใช้ GPS ความแม่นยำสูง
                    trackUserLocation: true, // ติดตามการเคลื่อนที่
                    showUserHeading: true // แสดงทิศทางหันหน้า
                });
                map.addControl(geolocate, 'bottom-right');

                // 3. เพิ่มปุ่มซูมเข้า-ออก และเข็มทิศ
                map.addControl(new mapboxgl.NavigationControl({ visualizePitch: true }), 'bottom-right');
                map.scrollZoom.disable(); 

                // ฟังก์ชันสำหรับเพิ่มตึก 3D
                function add3DBuildings() {
                    const layers = map.getStyle().layers;
                    let labelLayerId;
                    for (let i = 0; i < layers.length; i++) {
                        if (layers[i].type === 'symbol' && layers[i].layout['text-field']) {
                            labelLayerId = layers[i].id;
                            break;
                        }
                    }

                    if (!map.getLayer('3d-buildings')) {
                        map.addLayer({
                            'id': '3d-buildings',
                            'source': 'composite',
                            'source-layer': 'building',
                            'filter': ['==', 'extrude', 'true'],
                            'type': 'fill-extrusion',
                            'minzoom': 15, // จะแสดงตึก 3D เมื่อซูมระดับ 15 ขึ้นไป
                            'paint': {
                                'fill-extrusion-color': isDarkMode ? '#2c3e50' : '#e0e0e0', // สีตึกเปลี่ยนตามโหมด
                                'fill-extrusion-height': [
                                    'interpolate', ['linear'], ['zoom'],
                                    15, 0,
                                    15.05, ['get', 'height']
                                ],
                                'fill-extrusion-base': [
                                    'interpolate', ['linear'], ['zoom'],
                                    15, 0,
                                    15.05, ['get', 'min_height']
                                ],
                                'fill-extrusion-opacity': 0.8
                            }
                        }, labelLayerId);
                    }
                }

                // การตั้งค่าต่างๆ เมื่อโหลดแผนที่เสร็จ
                map.on('style.load', () => {
                    // ตั้งค่าบรรยากาศ (Fog)
                    map.setFog({
                        'color': isDarkMode ? 'rgb(25, 35, 50)' : 'rgb(186, 210, 235)', 
                        'high-color': isDarkMode ? 'rgb(15, 25, 40)' : 'rgb(36, 92, 223)', 
                        'space-color': isDarkMode ? 'rgb(11, 11, 25)' : 'rgb(220, 230, 240)',
                        'star-intensity': isDarkMode ? 0.8 : 0.0
                    });

                    // วาดตึก 3D
                    add3DBuildings();
                    
                    // บังคับเปลี่ยนชื่อเป็นภาษาไทย
                    const layers = map.getStyle().layers;
                    layers.forEach(layer => {
                        if (layer.type === 'symbol' && layer.layout && layer.layout['text-field']) {
                            const layerId = layer.id.toLowerCase();
                            if (layerId.includes('label') && !layerId.includes('shield')) {
                                try {
                                    map.setLayoutProperty(layer.id, 'text-field', [
                                        'coalesce',
                                        ['get', 'name_th'],
                                        ['get', 'name']
                                    ]);
                                } catch (e) {}
                            }
                        }
                    });
                });

                // การทำงานของปุ่มสลับโหมด
                const toggleBtn = document.getElementById('theme-toggle');
                toggleBtn.addEventListener('click', () => {
                    isDarkMode = !isDarkMode;
                    if (isDarkMode) {
                        map.setStyle(darkStyle);
                        toggleBtn.innerText = '☀️ เปลี่ยนเป็นโหมดสว่าง';
                        toggleBtn.classList.add('dark-btn');
                    } else {
                        map.setStyle(lightStyle);
                        toggleBtn.innerText = '🌙 เปลี่ยนเป็นโหมดมืด';
                        toggleBtn.classList.remove('dark-btn');
                    }
                });

            } catch (error) {
                console.error("เกิดข้อผิดพลาดในการโหลดแผนที่:", error);
            }
        };
    </script>
</body>
</html>
